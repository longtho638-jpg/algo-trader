name: Update CF DNS

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'Subdomain (e.g., api)'
        required: true
      tunnel_id:
        description: 'Tunnel UUID'
        required: true
        default: '35d5d11a-d15d-4fd6-83f3-5ccd6064a569'

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Update CNAME to tunnel
        run: |
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          SUBDOMAIN="${{ inputs.subdomain }}"
          TUNNEL="${{ inputs.tunnel_id }}"
          FQDN="${SUBDOMAIN}.cashclaw.cc"
          TARGET="${TUNNEL}.cfargotunnel.com"

          echo "Updating ${FQDN} → ${TARGET}"

          # Delete ALL existing records for this hostname (A, AAAA, CNAME)
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${FQDN}" \
            -H "Authorization: Bearer ${TOKEN}" | jq -r '.result[]?.id // empty' 2>/dev/null || echo "")

          if [ -n "$RECORDS" ]; then
            for RID in $RECORDS; do
              [ -z "$RID" ] && continue
              echo "Deleting old record ${RID}..."
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RID}" \
                -H "Authorization: Bearer ${TOKEN}" | jq -r '.success'
            done
          else
            echo "No existing records found — creating fresh"
          fi

          # Create fresh CNAME pointing to tunnel
          echo "Creating CNAME ${FQDN} → ${TARGET}..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"${FQDN}\",\"content\":\"${TARGET}\",\"proxied\":true}")
          echo "$RESULT" | jq '{success: .success, id: .result.id}'

          echo "Done. Verify: curl -sI https://${FQDN}"

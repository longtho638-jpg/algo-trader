name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Build & Test
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: npx vitest run

  # Job 2: Deploy Worker to Cloudflare
  deploy-worker:
    name: Deploy CF Worker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Job 3: Purge Cloudflare Cache
  purge-cache:
    name: Purge CF Cache
    runs-on: ubuntu-latest
    needs: deploy-worker
    if: github.event_name == 'push'

    steps:
      - name: Purge entire cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq .

      - name: Verify deployment
        run: |
          sleep 5
          HTTP_STATUS=$(curl -sI "https://${{ secrets.CF_WORKER_DOMAIN }}/health" | head -1 | awk '{print $2}')
          echo "Health check: HTTP $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] && echo "Deploy OK" || echo "WARN: Health check returned $HTTP_STATUS"

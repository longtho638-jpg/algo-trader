name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/algo-trade:${{ steps.version.outputs.VERSION }} \
            -t ${{ secrets.DOCKER_USERNAME }}/algo-trade:latest \
            .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/algo-trade:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/algo-trade:latest

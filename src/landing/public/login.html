<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CashClaw</title>
  <link rel="stylesheet" href="/ui/design-system/tokens.css" />
  <link rel="stylesheet" href="/ui/design-system/components.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-logo h1 {
      font-family: var(--font-data);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-accent);
      letter-spacing: -0.5px;
    }

    .auth-logo p {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      margin-top: var(--space-1);
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .error-msg {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      color: var(--color-loss);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }

    .error-msg.visible { display: block; }

    .auth-submit {
      width: 100%;
      margin-top: var(--space-2);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: var(--weight-medium);
    }

    .auth-footer a:hover { text-decoration: underline; }

    .auth-back {
      text-align: center;
      margin-top: var(--space-4);
      font-size: var(--text-xs);
    }

    .auth-back a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .auth-back a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="cc-card auth-card">
    <div class="auth-logo">
      <h1>CashClaw</h1>
      <p>Welcome back</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="cc-input-label" for="email">Email</label>
        <input class="cc-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="cc-input-label" for="password">Password</label>
        <input class="cc-input" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="cc-button cc-button--primary cc-button--lg auth-submit" id="submitBtn">Sign In</button>
    </form>

    <div class="auth-footer">
      No account yet? <a href="/register.html">Create one</a>
    </div>

    <div class="auth-back">
      <a href="/">&larr; Back to CashClaw</a>
    </div>
  </div>

  <script>
    var form = document.getElementById('loginForm');
    var errorMsg = document.getElementById('errorMsg');
    var submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function hideError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        });
        var data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed');
          return;
        }

        localStorage.setItem('algo_token', data.token);
        window.location.href = '/dashboard';
      } catch (err) {
        showError('Network error — please try again');
      } finally {
        submitBtn.disabled = false;
        if (submitBtn.textContent === 'Signing in...') {
          submitBtn.textContent = 'Sign In';
        }
      }
    });
  </script>
</body>
</html>

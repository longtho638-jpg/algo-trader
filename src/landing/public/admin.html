<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoTrade Admin — License Management</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px}
h1{font-size:1.5rem;color:#fff;margin-bottom:8px}
.subtitle{color:#888;margin-bottom:32px;font-size:.9rem}
.card{background:#151520;border:1px solid #2a2a3a;border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{font-size:1.1rem;color:#a0a0ff;margin-bottom:16px}
label{display:block;font-size:.8rem;color:#888;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:10px 12px;background:#0a0a15;border:1px solid #333;border-radius:8px;color:#fff;font-size:.9rem}
input:focus,select:focus{outline:none;border-color:#6060ff}
.row{display:flex;gap:12px}
.row>*{flex:1}
button{padding:10px 20px;background:#4040cc;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;margin-top:16px;width:100%}
button:hover{background:#5050dd}
button.danger{background:#cc4040}
button.danger:hover{background:#dd5050}
.result{margin-top:16px;padding:16px;background:#0a0a15;border:1px solid #2a2a3a;border-radius:8px;font-family:monospace;font-size:.85rem;word-break:break-all;display:none}
.result.show{display:block}
.result .key{color:#60ff60;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:8px;border-bottom:1px solid #333;color:#888;font-weight:500}
td{padding:8px;border-bottom:1px solid #1a1a2a}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.badge.pro{background:#2a2a6a;color:#8080ff}
.badge.enterprise{background:#2a4a2a;color:#60cc60}
.badge.free{background:#3a3a3a;color:#aaa}
.badge.active{background:#1a3a1a;color:#60ff60}
.badge.revoked{background:#3a1a1a;color:#ff6060}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#151520;border:1px solid #2a2a3a;border-radius:8px;padding:16px;text-align:center}
.stat .value{font-size:1.5rem;font-weight:700;color:#fff}
.stat .label{font-size:.75rem;color:#888;margin-top:4px}
.copy-btn{display:inline-block;padding:2px 8px;background:#333;border:none;color:#aaa;border-radius:4px;cursor:pointer;font-size:.75rem;margin-left:4px}
.copy-btn:hover{background:#444;color:#fff}
#msg{position:fixed;top:16px;right:16px;padding:12px 20px;border-radius:8px;font-size:.85rem;display:none;z-index:999}
#msg.success{background:#1a3a1a;color:#60ff60;border:1px solid #2a4a2a;display:block}
#msg.error{background:#3a1a1a;color:#ff6060;border:1px solid #4a2a2a;display:block}
</style>
</head>
<body>
<div id="msg"></div>
<div class="container">
  <h1>AlgoTrade Admin</h1>
  <p class="subtitle">License Management Dashboard — cashclaw.cc</p>

  <div class="stats" id="stats">
    <div class="stat"><div class="value" id="stat-licenses">-</div><div class="label">Active Licenses</div></div>
    <div class="stat"><div class="value" id="stat-pro">-</div><div class="label">Pro</div></div>
    <div class="stat"><div class="value" id="stat-enterprise">-</div><div class="label">Enterprise</div></div>
  </div>

  <div class="card">
    <h2>Generate License Key</h2>
    <div class="row">
      <div><label>Customer ID</label><input id="userId" placeholder="customer_email or ID"></div>
      <div><label>Tier</label><select id="tier"><option value="pro">Pro ($149/mo)</option><option value="enterprise">Enterprise ($499/mo)</option><option value="free">Free (trial)</option></select></div>
      <div><label>Days</label><input id="days" type="number" value="30" min="1" max="365"></div>
    </div>
    <button onclick="generateKey()">Generate License Key</button>
    <div class="result" id="genResult"></div>
  </div>

  <div class="card">
    <h2>Active Licenses</h2>
    <table>
      <thead><tr><th>Customer</th><th>Tier</th><th>Expires</th><th>Key</th><th>Action</th></tr></thead>
      <tbody id="licenseTable"><tr><td colspan="5" style="color:#666">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Validate Key</h2>
    <label>License Key</label>
    <input id="validateKey" placeholder="Paste license key to validate">
    <button onclick="validateKey()">Validate</button>
    <div class="result" id="valResult"></div>
  </div>
</div>

<script>
const API = window.location.origin;
// Admin auth token — set via login or hardcode for internal use
let AUTH_TOKEN = localStorage.getItem('admin_token') || '';

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': AUTH_TOKEN ? 'Bearer ' + AUTH_TOKEN : '',
      ...opts.headers,
    },
  });
  return res.json();
}

function msg(text, type = 'success') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  setTimeout(() => el.className = '', 3000);
}

async function generateKey() {
  const userId = document.getElementById('userId').value || 'customer_' + Date.now();
  const tier = document.getElementById('tier').value;
  const days = parseInt(document.getElementById('days').value) || 30;

  const data = await api('/api/admin/license/issue', {
    method: 'POST',
    body: JSON.stringify({ userId, tier, days }),
  });

  const el = document.getElementById('genResult');
  if (data.key) {
    el.innerHTML = `
      <div style="color:#888;margin-bottom:8px">Customer: <b>${data.userId}</b> | Tier: <b>${data.tier}</b> | Expires: <b>${data.expiresAt?.slice(0,10)}</b></div>
      <div>License Key:</div>
      <div class="key" id="generatedKey">${data.key}</div>
      <button class="copy-btn" onclick="copyKey()" style="margin-top:8px;width:auto">Copy Key</button>
    `;
    el.classList.add('show');
    msg('License key generated!');
    loadLicenses();
  } else {
    el.innerHTML = '<span style="color:#ff6060">Error: ' + (data.error || 'Unknown') + '</span>';
    el.classList.add('show');
  }
}

function copyKey() {
  const key = document.getElementById('generatedKey')?.textContent;
  if (key) {
    navigator.clipboard.writeText(key);
    msg('Key copied to clipboard!');
  }
}

async function loadLicenses() {
  const data = await api('/api/admin/licenses');
  const tbody = document.getElementById('licenseTable');

  if (!data.licenses || data.licenses.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#666">No active licenses</td></tr>';
    return;
  }

  // Stats
  document.getElementById('stat-licenses').textContent = data.count;
  document.getElementById('stat-pro').textContent = data.licenses.filter(l => l.tier === 'pro').length;
  document.getElementById('stat-enterprise').textContent = data.licenses.filter(l => l.tier === 'enterprise').length;

  tbody.innerHTML = data.licenses.map(l => {
    const expires = new Date(l.expiresAt);
    const daysLeft = Math.floor((expires - Date.now()) / 86400000);
    const status = l.revoked ? 'revoked' : 'active';
    return `<tr>
      <td>${l.userId}</td>
      <td><span class="badge ${l.tier}">${l.tier}</span></td>
      <td>${daysLeft}d left</td>
      <td><code style="font-size:.7rem">${l.keyPreview}</code>
        <button class="copy-btn" onclick="navigator.clipboard.writeText('${l.fullKey}');msg('Copied!')">Copy</button></td>
      <td><button class="danger copy-btn" onclick="revokeKey('${l.fullKey}')">Revoke</button></td>
    </tr>`;
  }).join('');
}

async function revokeKey(key) {
  if (!confirm('Revoke this license? Customer will lose access.')) return;
  await api('/api/admin/license/revoke', {
    method: 'POST',
    body: JSON.stringify({ key }),
  });
  msg('License revoked');
  loadLicenses();
}

async function validateKey() {
  const key = document.getElementById('validateKey').value;
  if (!key) return;
  const data = await api('/api/license/validate', {
    method: 'POST',
    body: JSON.stringify({ key }),
  });
  const el = document.getElementById('valResult');
  if (data.valid) {
    el.innerHTML = `<span style="color:#60ff60">VALID</span> — Tier: <b>${data.tier}</b> | ${data.remainingDays} days left | Expires: ${data.expiresAt?.slice(0,10)}`;
  } else {
    el.innerHTML = `<span style="color:#ff6060">INVALID</span> — ${data.error}`;
  }
  el.classList.add('show');
}

// Load on page open
loadLicenses();
</script>
</body>
</html>

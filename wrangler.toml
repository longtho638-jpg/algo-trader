# Cloudflare Workers Configuration
# This worker acts as edge proxy for the algo-trade API
# Main app runs on VPS (Docker), CF provides CDN + DDoS protection

name = "algo-trader"
main = "src/workers/edge-proxy.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Production (default)
[vars]
ENVIRONMENT = "production"

# KV namespace for rate limiting + cache
[[kv_namespaces]]
binding = "CACHE"
id = ""
preview_id = ""

# Staging
[env.staging]
name = "algo-trader-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# Build config
[build]
command = "pnpm run build:worker"

# Custom domain (configure in CF dashboard)
# routes = [{ pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }]

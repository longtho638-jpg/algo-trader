# Monitoring stack override — usage:
# docker compose -f docker-compose.yml -f docker/monitoring/docker-compose.monitoring.yml up

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: algo-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - algo-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: algo-grafana
    restart: unless-stopped
    ports:
      - '3030:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/trading-performance.json
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - algo-net

# Use the same network as base compose
networks:
  algo-net:
    external: true
    name: algo-trader_algo-net

volumes:
  prometheus_data:
  grafana_data:

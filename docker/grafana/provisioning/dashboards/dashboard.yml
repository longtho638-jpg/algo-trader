# Auto-provision dashboards from /var/lib/grafana/dashboards directory
apiVersion: 1

providers:
  - name: 'algo-trader-dashboards'
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# TimescaleDB Docker Compose Override
# Usage (combine with base docker-compose.yml):
#   docker compose -f docker-compose.yml -f docker/timescaledb/docker-compose.timescaledb.yml up
#
# This file adds a TimescaleDB service as a production-grade time-series database
# for algo-trader market data (prices, order books, trades, signals).

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: algo-trader-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-algotrader}
      POSTGRES_USER: ${TIMESCALE_USER:-algotrader}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:?TIMESCALE_PASSWORD is required}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-algotrader} -d ${TIMESCALE_DB:-algotrader}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - algo-trader-network

volumes:
  timescaledb_data:
    driver: local

networks:
  algo-trader-network:
    external: true
    name: algo-trader-network
